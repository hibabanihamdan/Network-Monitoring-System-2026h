<!DOCTYPE html>
<html>
<head>
    <title>Network Monitoring System</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
body {
    font-family: Arial;
    margin: 0;
    text-align: center;
    background: black;
    overflow-y: auto;
    color: white;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(
        45deg,
        #00f0ff,
        #0051ff,
        #000814,
        #00f0ff
    );
    animation: moveBg 12s linear infinite;
    z-index: -2;
}

@keyframes moveBg {
    0% { transform: translate(0, 0); }
    50% { transform: translate(-25%, -25%); }
    100% { transform: translate(0, 0); }
}

/* FLOAT EFFECT */
.background::before,
.background::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    filter: blur(150px);
    opacity: 0.6;
}

.background::before {
    background: #00f0ff;
    animation: float1 10s infinite alternate;
}

.background::after {
    background: #0051ff;
    animation: float2 12s infinite alternate;
}

@keyframes float1 {
    from { transform: translate(0,0); }
    to { transform: translate(300px, 200px); }
}

@keyframes float2 {
    from { transform: translate(500px,300px); }
    to { transform: translate(100px, 50px); }
}

/* ⭐ WELCOME */
.welcome {
    font-size: 32px;
    font-weight: bold;
    color: #00f0ff;
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 0 15px #00f0ff;

    opacity: 0;
    transform: translateY(-20px);
    animation: welcomeFade 2s ease forwards;
}

/* SITE TITLE */
.site-title {
    font-size: 20px;
    color: white;
    text-align: center;
    margin-bottom: 20px;

    opacity: 0;
    transform: translateY(-10px);
    animation: titleFade 2.5s ease forwards;
}

@keyframes welcomeFade {
    0% {
        opacity: 0;
        transform: translateY(-30px);
        letter-spacing: 6px;
    }
    100% {
        opacity: 1;
        transform: translateY(0);
        letter-spacing: 2px;
    }
}

@keyframes titleFade {
    0% { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 1000px;
    margin: auto;
}

/* LAYOUT */
.dashboard {
    display: flex;
    gap: 25px;
    align-items: flex-start;
    justify-content: center;
}

/* LEFT */
.left {
    flex: 1;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 15px #00f0ff;
}

/* RIGHT */
.right {
    flex: 1;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 15px #00f0ff;
}

/* CARDS */
.cards {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.card {
    flex: 1;
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 10px #00f0ff;
    font-weight: bold;
    font-size: 14px;
}

/* CHART */
canvas {
    max-width: 250px;
    max-height: 250px;
    margin: auto;
    display: block;
}

/* INPUTS */
input {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border: none;
    border-bottom: 2px solid #555;
    background: transparent;
    color: white;
    outline: none;
}

input:focus {
    border-bottom: 2px solid #00f0ff;
}

/* BUTTONS */
button {
    padding: 10px 16px;
    margin: 6px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.add-btn { background: #3498db; color: white; }
.delete-btn { background: #e74c3c; color: white; }
.edit-btn { background: #f39c12; color: white; }
.check-btn { background: #2ecc71; color: white; }

/* LIST */
li {
    list-style: none;
    background: rgba(255,255,255,0.05);
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    text-align: left;
}

/* STATUS */
.status {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    margin-left: 10px;
}

.online { background: #2ecc71; }
.offline { background: #e74c3c; }

#resultBox {
    margin-top: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    transition: 0.3s;
}

.footer:hover {
    color: #00f0ff;
    text-shadow: 0 0 10px #00f0ff;
}
    </style>
</head>

<body>

<div class="background"></div>

<!-- WELCOME -->
<div class="welcome">Welcome</div>
<div class="site-title">Network Monitoring System</div>

<div class="container">

<div class="dashboard">

    <!-- LEFT -->
    <div class="left">

        <div class="cards">
            <div class="card">Total: <span id="total">0</span></div>
            <div class="card">Online: <span id="online">0</span></div>
            <div class="card">Offline: <span id="offline">0</span></div>
        </div>

        <canvas id="chart"></canvas>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <input type="text" id="search" placeholder="Search..." onkeyup="displayDevices()">

        <input type="text" id="deviceName" placeholder="Device Name">
        <input type="text" id="ipAddress" placeholder="IP / Website">

        <button class="add-btn" onclick="addDevice()">Add Device</button>
        <button class="check-btn" onclick="checkDevice()">Check Device</button>

        <div id="resultBox">No check yet</div>

        <ul id="deviceList"></ul>

    </div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">
    Designed & Developed by Hiba Ay
</div>

<script>
let devices = JSON.parse(localStorage.getItem("devices")) || [];
let chart;

function addDevice() {
    let name = document.getElementById("deviceName").value;
    let ip = document.getElementById("ipAddress").value;

    if (!name || !ip) return alert("Fill all fields");

    devices.push({
        name,
        ip,
        status: "Unknown",
        time: new Date().toLocaleString()
    });

    save();
    displayDevices();
}

function displayDevices() {
    let list = document.getElementById("deviceList");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    let total = devices.length;
    let online = devices.filter(d => d.status === "Online").length;
    let offline = devices.filter(d => d.status === "Offline").length;

    document.getElementById("total").innerText = total;
    document.getElementById("online").innerText = online;
    document.getElementById("offline").innerText = offline;

    devices.forEach((d, i) => {
        if (!d.name.toLowerCase().includes(search)) return;

        let li = document.createElement("li");

        li.innerHTML = `
            <b>${d.name}</b> - ${d.ip}
            <span class="status ${d.status === "Online" ? "online" : "offline"}">
                ${d.status}
            </span>
            <br>
            <small>${d.time}</small>
            <br>
            <button class="edit-btn" onclick="editDevice(${i})">Edit</button>
            <button class="delete-btn" onclick="deleteDevice(${i})">Delete</button>
        `;

        list.appendChild(li);
    });

    updateChart();
}

function updateChart() {
    let online = devices.filter(d => d.status === "Online").length;
    let offline = devices.filter(d => d.status === "Offline").length;

    if (chart) chart.destroy();

    let ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels: ["Online", "Offline"],
            datasets: [{
                data: [online, offline],
                backgroundColor: ["#2ecc71", "#e74c3c"]
            }]
        }
    });
}

function deleteDevice(i) {
    devices.splice(i, 1);
    save();
    displayDevices();
}

function editDevice(i) {
    let name = prompt("New Name:", devices[i].name);
    let ip = prompt("New IP:", devices[i].ip);

    if (name && ip) {
        devices[i].name = name;
        devices[i].ip = ip;
        devices[i].time = new Date().toLocaleString();

        save();
        displayDevices();
    }
}

async function checkDevice() {
    let ip = document.getElementById("ipAddress").value;
    let box = document.getElementById("resultBox");

    if (!ip) return alert("Enter IP");

    box.innerHTML = "Checking...";

    try {
        const res = await fetch("/check", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ip })
        });

        const data = await res.json();

        box.innerHTML = `${data.status === "Online" ? "🟢" : "🔴"} ${ip} is ${data.status}`;

    } catch {
        box.innerHTML = "Error connecting to server";
    }
}

function save() {
    localStorage.setItem("devices", JSON.stringify(devices));
}

window.onload = displayDevices;
</script>

</body>
</html>
